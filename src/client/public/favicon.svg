<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PegNav">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A726A"/>
      <stop offset="100%" stop-color="#1F5C56"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F4EC"/>
      <stop offset="100%" stop-color="#E8E1CF"/>
    </linearGradient>
  </defs>
  <!-- 钉板底板 -->
  <rect width="64" height="64" rx="14" fill="url(#plate)"/>
  <!-- 卡片 -->
  <rect x="12" y="14" width="40" height="38" rx="6" fill="url(#paper)" stroke="#C9C1AC" stroke-width="1.2"/>
  <!-- 钉孔 -->
  <circle cx="32" cy="18" r="4.2" fill="#ECE7DC" stroke="#1F5C56" stroke-width="1.5"/>
  <circle cx="32" cy="18" r="1.6" fill="#2B2A28" opacity="0.55"/>
  <!-- 钉子头高光 -->
  <circle cx="32" cy="12.5" r="3.2" fill="#A85C32"/>
  <circle cx="31" cy="11.5" r="1" fill="#F0C9A8" opacity="0.9"/>
  <!-- 简易路径/链接感 -->
  <path d="M22 30h20M22 38h14" stroke="#1F5C56" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="44" cy="38" r="2.2" fill="#A85C32"/>
</svg>
