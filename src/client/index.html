<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工坊 · 个人导航</title>
  <meta name="description" content="PegNav · 工坊个人导航页">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <meta name="theme-color" content="#1F5C56">
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-plate">工坊 · Bench</div>
      <div class="brand-sub">Personal / Nav Board</div>
    </div>
    <div class="header-actions">
      <button class="add-cat-btn" id="exportBtn" style="display:none" type="button">导出</button>
      <button class="add-cat-btn" id="importBtn" style="display:none" type="button">导入书签</button>
      <button class="add-cat-btn" id="addCatBtn" style="display:none" type="button">+ 新建分类</button>
      <button class="auth-btn" id="loginBtn" type="button">管理员登录</button>
      <button class="auth-btn" id="logoutBtn" style="display:none" type="button">退出管理</button>
    </div>
  </header>

  <div class="search-bar">
    <div class="engine-switch" id="engineSwitch">
      <button class="active" data-engine="baidu" type="button">百度</button>
      <button data-engine="bing" type="button">Bing</button>
      <button data-engine="google" type="button">Google</button>
      <button data-engine="local" type="button" title="筛选本站卡片">站内</button>
    </div>
    <div class="search-field">
      <input id="searchInput" placeholder="输入关键词搜索…" enterkeyhint="search" autocomplete="off">
      <button class="go" id="searchGo" type="button" aria-label="搜索">→</button>
    </div>
  </div>
  <div class="filter-hint" id="filterHint" hidden></div>

  <div id="sections"></div>
</div>

<div class="mask" id="mask">
  <div class="modal">
    <h3 id="modalTitle">添加标签</h3>
    <div class="field"><label>名称</label><input id="fTitle" placeholder="例如 GitHub"></div>
    <div class="field"><label>网址</label><input id="fUrl" placeholder="github.com 或 https://github.com"></div>
    <div class="field"><label>所属分类</label><select id="fCat"></select></div>
    <div class="modal-actions">
      <button class="btn ghost" id="modalCancel" type="button">取消</button>
      <button class="btn primary" id="modalSave" type="button">保存</button>
    </div>
  </div>
</div>

<div class="mask" id="loginMask">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <h3 id="loginTitle">管理员登录</h3>
    <p class="modal-desc">输入管理密码后可添加、编辑与删除分类和链接。</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginPassword">管理密码</label>
        <input
          id="loginPassword"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="请输入密码"
          required
        >
      </div>
      <p class="field-error" id="loginError" hidden></p>
      <div class="modal-actions">
        <button class="btn ghost" id="loginCancel" type="button">取消</button>
        <button class="btn primary" id="loginSubmit" type="submit">登录</button>
      </div>
    </form>
  </div>
</div>

<div class="mask" id="importMask">
  <div class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="importTitle">
    <h3 id="importTitle">导入书签</h3>
    <p class="modal-desc">
      支持 Chrome / Edge / Firefox 导出的 HTML 书签文件（如 favorites_*.html）。
      文件夹会映射为分类，系统根目录名（收藏夹栏等）会自动跳过。
    </p>
    <div class="field">
      <label for="importFile">选择文件</label>
      <input id="importFile" type="file" accept=".html,.htm,text/html">
    </div>
    <div class="field">
      <label>导入模式</label>
      <div class="radio-row">
        <label class="radio-label">
          <input type="radio" name="importMode" value="merge" checked>
          合并（同名分类追加，已存在的网址跳过）
        </label>
        <label class="radio-label">
          <input type="radio" name="importMode" value="replace">
          替换（清空现有全部分类与链接后再导入）
        </label>
      </div>
    </div>
    <div class="import-preview" id="importPreview" hidden>
      <div class="import-preview-title">预览</div>
      <pre id="importPreviewText"></pre>
    </div>
    <p class="field-error" id="importError" hidden></p>
    <div class="modal-actions">
      <button class="btn ghost" id="importCancel" type="button">取消</button>
      <button class="btn primary" id="importSubmit" type="button" disabled>开始导入</button>
    </div>
  </div>
</div>

<div class="mask" id="confirmMask">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <h3 id="confirmTitle">确认</h3>
    <p class="modal-desc" id="confirmMessage"></p>
    <div class="modal-actions">
      <button class="btn ghost" id="confirmCancel" type="button">取消</button>
      <button class="btn primary" id="confirmOk" type="button">确定</button>
    </div>
  </div>
</div>

<div class="mask" id="promptMask">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="promptTitle">
    <h3 id="promptTitle">输入</h3>
    <p class="modal-desc" id="promptMessage" hidden></p>
    <form id="promptForm">
      <div class="field">
        <label for="promptInput" class="sr-only">内容</label>
        <input id="promptInput" type="text" autocomplete="off" required>
      </div>
      <p class="field-error" id="promptError" hidden></p>
      <div class="modal-actions">
        <button class="btn ghost" id="promptCancel" type="button">取消</button>
        <button class="btn primary" id="promptOk" type="submit">确定</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="./main.ts"></script>
</body>
</html>
