<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>工坊 · 个人导航</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #ECE7DC;
    --peg: #DCD5C1;
    --card: #F7F4EC;
    --card-2: #E3DDCC;
    --ink: #2B2A28;
    --ink-soft: #726B5C;
    --teal: #1F5C56;
    --sienna: #A85C32;
    --line: #C9C1AC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(circle, var(--peg) 1.6px, transparent 1.6px) 0 0/28px 28px,
      var(--bg);
    font-family:'Inter',sans-serif; color:var(--ink);
    padding: 40px 24px 100px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:36px; flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-plate{
    background:var(--teal); color:#F7F4EC; font-family:'Zilla Slab',serif;
    font-weight:700; font-size:22px; padding:8px 16px 6px; border-radius:4px;
    box-shadow: 0 3px 0 rgba(0,0,0,.12); letter-spacing:.5px;
  }
  .brand-sub{color:var(--ink-soft);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .header-actions{display:flex; gap:10px; align-items:center;}
  .add-cat-btn{
    background:transparent; border:1.5px dashed var(--line); color:var(--ink-soft);
    padding:10px 18px; border-radius:8px; font-size:14px; cursor:pointer;
    font-family:'Inter',sans-serif; transition:.15s;
  }
  .add-cat-btn:hover{border-color:var(--teal);color:var(--teal);}
  .auth-btn{
    background:transparent; border:1px solid var(--line); color:var(--ink-soft);
    padding:9px 16px; border-radius:8px; font-size:13px; cursor:pointer; font-family:'Inter';
  }
  .auth-btn:hover{ border-color:var(--sienna); color:var(--sienna); }

  .search-bar{
    background:var(--card); border-radius:12px; padding:14px 16px;
    display:flex; align-items:center; gap:12px; margin-bottom:34px;
    box-shadow: 0 6px 16px rgba(43,42,40,.08), 0 1px 0 rgba(255,255,255,.6) inset;
    border:1px solid var(--line);
  }
  .engine-switch{ display:flex; gap:4px; background:var(--card-2); border-radius:8px; padding:3px; }
  .engine-switch button{
    border:none; background:transparent; padding:7px 13px; border-radius:6px;
    font-family:'Inter'; font-size:13px; color:var(--ink-soft); cursor:pointer; transition:.15s;
  }
  .engine-switch button.active{ background:var(--teal); color:#F7F4EC; font-weight:600; }
  .search-bar input{
    flex:1; border:none; background:transparent; outline:none;
    font-family:'Inter'; font-size:15px; color:var(--ink); min-width:0;
  }
  .search-bar input::placeholder{ color:var(--ink-soft); }
  .search-bar .go{
    border:none; background:var(--sienna); color:#fff; width:36px; height:36px; border-radius:8px;
    cursor:pointer; font-size:15px; flex-shrink:0;
  }
  .search-bar .go:hover{ background:var(--teal); }

  .section{margin-bottom:44px;}
  .section-head{display:flex; align-items:center; gap:12px; margin-bottom:20px;}
  .hook{width:10px;height:10px;border-radius:50%;background:var(--ink);box-shadow: inset 0 0 0 2px var(--teal); flex-shrink:0;}
  .section-title{font-family:'Zilla Slab',serif;font-weight:600;font-size:20px;color:var(--ink);letter-spacing:.3px;}
  .section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
  .section-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .del-cat{
    border:none; background:transparent; color:var(--ink-soft); cursor:pointer; font-size:12px;
    width:20px; height:20px; border-radius:5px;
  }
  .del-cat:hover{ background:#A83232; color:#fff; }

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:20px 16px;}

  .tag-card{
    position:relative; background:var(--card); border-radius:8px;
    padding:18px 14px 14px; box-shadow: 0 6px 14px rgba(43,42,40,.10), 0 1px 0 rgba(255,255,255,.6) inset;
    cursor:pointer; transition: transform .18s ease; border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px;
  }
  .tag-card:nth-child(odd){ transform: rotate(-1.1deg); }
  .tag-card:nth-child(even){ transform: rotate(1deg); }
  .tag-card:hover{ transform: translateY(-4px) rotate(0deg); border-color:var(--teal); }

  .peg-hole{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:14px;height:14px;border-radius:50%; background:var(--bg);
    box-shadow: inset 0 2px 4px rgba(43,42,40,.18), 0 0 0 3px var(--card);
  }
  .favicon-wrap{
    width:44px;height:44px;border-radius:10px;
    background:#fff; border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    box-shadow: 0 2px 6px rgba(43,42,40,.08);
    overflow:hidden;
  }
  .favicon-wrap img{width:26px;height:26px;object-fit:contain;}
  .favicon-fallback{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--teal),var(--sienna));
    color:#fff;font-size:16px;font-weight:700;font-family:'Zilla Slab',serif;
  }
  .tag-card .title{font-family:'Zilla Slab',serif;font-weight:600;font-size:14.5px;margin:0;color:var(--ink);line-height:1.25;}
  .url-tooltip{
    position:absolute; bottom:-8px; left:50%; transform:translateX(-50%) translateY(100%);
    background:var(--ink); color:#F7F4EC; font-family:'JetBrains Mono',monospace; font-size:10.5px;
    padding:5px 9px; border-radius:6px; white-space:nowrap; opacity:0; pointer-events:none;
    transition:.15s ease; z-index:6;
  }
  .url-tooltip::before{
    content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
    border:4px solid transparent; border-bottom-color:var(--ink);
  }
  .tag-card:hover .url-tooltip{ opacity:1; transform:translateX(-50%) translateY(calc(100% + 6px)); }

  .tag-card .actions{position:absolute; top:8px; right:8px; display:flex; gap:5px; opacity:0; transition:.15s;}
  .tag-card:hover .actions{opacity:1;}
  .tag-card .actions button{width:20px;height:20px;border:none;border-radius:5px;background:var(--card-2);color:var(--ink-soft);font-size:11px;cursor:pointer;}
  .tag-card .actions button:hover{background:var(--teal);color:#fff;}
  .tag-card .actions button.del:hover{background:#A83232;color:#fff;}

  .add-card{
    position:relative; border:2px dashed var(--line); border-radius:8px;
    display:flex;align-items:center;justify-content:center; flex-direction:column; gap:6px;
    min-height:112px; color:var(--ink-soft); cursor:pointer; background:transparent; transition:.15s;
  }
  .add-card:hover{ border-color:var(--teal); color:var(--teal); }
  .add-card .plus{font-size:24px;line-height:1;}
  .add-card span{font-size:11px;font-family:'Inter',sans-serif;}

  .empty-state{
    color:var(--ink-soft); font-size:14px; text-align:center; padding:60px 20px;
  }

  .mask{position:fixed; inset:0; background:rgba(43,42,40,.35); display:none; align-items:center; justify-content:center; z-index:50; backdrop-filter: blur(2px);}
  .mask.show{display:flex;}
  .modal{background:var(--card); width:360px; max-width:90vw; border-radius:10px; padding:24px; box-shadow:0 20px 50px rgba(43,42,40,.25); border:1px solid var(--line);}
  .modal h3{font-family:'Zilla Slab',serif; margin:0 0 16px; font-size:18px; color:var(--ink);}
  .field{margin-bottom:12px;}
  .field label{font-size:12px;color:var(--ink-soft);display:block;margin-bottom:5px;font-family:'Inter';}
  .field input, .field select{width:100%; padding:9px 10px; border-radius:6px; border:1px solid var(--line); font-family:'Inter'; font-size:14px; background:#FBF8F0; color:var(--ink);}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}
  .btn{padding:9px 16px; border-radius:6px; border:none; font-size:13px; cursor:pointer; font-family:'Inter';}
  .btn.ghost{background:transparent; color:var(--ink-soft);}
  .btn.primary{background:var(--teal); color:#fff; font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-plate">工坊 · Bench</div>
      <div class="brand-sub">Personal / Nav Board</div>
    </div>
    <div class="header-actions">
      <button class="add-cat-btn" id="addCatBtn" style="display:none" onclick="addCategory()">+ 新建分类</button>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">管理员登录</button>
      <button class="auth-btn" id="logoutBtn" style="display:none" onclick="doLogout()">退出管理</button>
    </div>
  </header>

  <div class="search-bar">
    <div class="engine-switch" id="engineSwitch">
      <button class="active" data-engine="baidu" onclick="setEngine('baidu')">百度</button>
      <button data-engine="bing" onclick="setEngine('bing')">Bing</button>
      <button data-engine="google" onclick="setEngine('google')">Google</button>
    </div>
    <input id="searchInput" placeholder="输入关键词搜索…" onkeydown="if(event.key==='Enter') doSearch();">
    <button class="go" onclick="doSearch()">→</button>
  </div>

  <div id="sections"></div>
</div>

<div class="mask" id="mask">
  <div class="modal">
    <h3 id="modalTitle">添加标签</h3>
    <div class="field"><label>名称</label><input id="fTitle" placeholder="例如 GitHub"></div>
    <div class="field"><label>网址</label><input id="fUrl" placeholder="github.com 或 https://github.com"></div>
    <div class="field"><label>所属分类</label><select id="fCat"></select></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveCard()">保存</button>
    </div>
  </div>
</div>

<script>
let data = [];       // [{id, cat, items:[{id,t,u}]}]
let editing = null;  // {catId, itemId} or null
let isAdmin = false;
let adminPw = localStorage.getItem('admin_pw') || '';
let currentEngine = 'baidu';

const engineUrls = {
  baidu: q => `https://www.baidu.com/s?wd=${q}`,
  bing: q => `https://www.bing.com/search?q=${q}`,
  google: q => `https://www.google.com/search?q=${q}`,
};
function setEngine(e){
  currentEngine = e;
  document.querySelectorAll('#engineSwitch button').forEach(b=>{
    b.classList.toggle('active', b.dataset.engine === e);
  });
  document.getElementById('searchInput').focus();
}
function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  window.open(engineUrls[currentEngine](encodeURIComponent(q)), '_blank');
}

function domainOf(u){
  try{ return new URL(u.startsWith('http')?u:'https://'+u).hostname; }catch(e){ return u; }
}
function faviconUrl(u){
  return `https://www.google.com/s2/favicons?sz=64&domain=${domainOf(u)}`;
}
function authHeaders(){
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminPw };
}

// ---------- 数据加载 ----------
async function loadData(){
  const res = await fetch('/api/data');
  const json = await res.json();
  data = json.categories.map(c => ({
    id: c.id, cat: c.name,
    items: c.items.map(i => ({ id: i.id, t: i.title, u: i.url })),
  }));
  render();
}

// ---------- 登录/登出 ----------
async function verifyStoredPassword(){
  if(!adminPw) return;
  const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password: adminPw}) });
  if(res.ok){ isAdmin = true; } else { adminPw=''; localStorage.removeItem('admin_pw'); isAdmin=false; }
  updateAdminUI();
}
async function doLogin(){
  const pw = prompt('输入管理密码：');
  if(!pw) return;
  const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
  if(res.ok){
    adminPw = pw; localStorage.setItem('admin_pw', pw); isAdmin = true;
    updateAdminUI(); render();
  } else {
    alert('密码错误');
  }
}
function doLogout(){
  adminPw=''; localStorage.removeItem('admin_pw'); isAdmin=false;
  updateAdminUI(); render();
}
function updateAdminUI(){
  document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'inline-block';
  document.getElementById('logoutBtn').style.display = isAdmin ? 'inline-block' : 'none';
  document.getElementById('addCatBtn').style.display = isAdmin ? 'inline-block' : 'none';
}

// ---------- 渲染 ----------
function render(){
  const root = document.getElementById('sections');
  root.innerHTML = '';
  if(data.length === 0){
    root.innerHTML = '<div class="empty-state">还没有分类，' + (isAdmin ? '点右上角"新建分类"开始添加。' : '主人还没有整理好这里。') + '</div>';
    return;
  }
  data.forEach((section) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-head">
        <div class="hook"></div>
        <div class="section-title">${section.cat}</div>
        <div class="section-line"></div>
        <div class="section-count">${section.items.length} 项</div>
        ${isAdmin ? `<button class="del-cat" onclick="deleteCategory(${section.id})">✕</button>` : ''}
      </div>
      <div class="grid" id="grid-${section.id}"></div>
    `;
    root.appendChild(sec);
    const grid = sec.querySelector(`#grid-${section.id}`);
    section.items.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'tag-card';
      card.onclick = () => window.open('https://'+domainOf(item.u), '_blank');
      card.innerHTML = `
        <div class="peg-hole"></div>
        ${isAdmin ? `
        <div class="actions">
          <button onclick="editCard(${section.id},${item.id}, event)">✎</button>
          <button class="del" onclick="deleteCard(${item.id}, event)">✕</button>
        </div>` : ''}
        <div class="favicon-wrap">
          <img src="${faviconUrl(item.u)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="favicon-fallback" style="display:none;">${item.t.slice(0,1)}</div>
        </div>
        <div class="title">${item.t}</div>
        <div class="url-tooltip">${domainOf(item.u)}</div>
      `;
      grid.appendChild(card);
    });
    if(isAdmin){
      const addBtn = document.createElement('div');
      addBtn.className = 'add-card';
      addBtn.onclick = () => openModal(section.id);
      addBtn.innerHTML = `<div class="plus">+</div><span>添加标签</span>`;
      grid.appendChild(addBtn);
    }
  });
}

// ---------- 分类操作 ----------
async function addCategory(){
  if(!isAdmin) return;
  const name = prompt('新分类名称');
  if(!name || !name.trim()) return;
  await fetch('/api/categories', { method:'POST', headers: authHeaders(), body: JSON.stringify({name: name.trim()}) });
  loadData();
}
async function deleteCategory(catId){
  if(!isAdmin) return;
  if(!confirm('删除该分类会连同其中的标签一起删除，确定吗？')) return;
  await fetch(`/api/categories/${catId}`, { method:'DELETE', headers: authHeaders() });
  loadData();
}

// ---------- 标签操作 ----------
function fillCatOptions(selectedId){
  const sel = document.getElementById('fCat');
  sel.innerHTML = data.map(s=>`<option value="${s.id}">${s.cat}</option>`).join('');
  sel.value = selectedId;
}
function openModal(catId){
  editing = null;
  document.getElementById('modalTitle').textContent = '添加标签';
  document.getElementById('fTitle').value = '';
  document.getElementById('fUrl').value = '';
  fillCatOptions(catId);
  document.getElementById('mask').classList.add('show');
}
function editCard(catId, itemId, e){
  e.stopPropagation();
  const section = data.find(s => s.id === catId);
  const item = section.items.find(i => i.id === itemId);
  editing = { itemId };
  document.getElementById('modalTitle').textContent = '编辑标签';
  document.getElementById('fTitle').value = item.t;
  document.getElementById('fUrl').value = item.u;
  fillCatOptions(catId);
  document.getElementById('mask').classList.add('show');
}
async function deleteCard(itemId, e){
  e.stopPropagation();
  if(!isAdmin) return;
  await fetch(`/api/links/${itemId}`, { method:'DELETE', headers: authHeaders() });
  loadData();
}
function closeModal(){ document.getElementById('mask').classList.remove('show'); }
async function saveCard(){
  const t = document.getElementById('fTitle').value.trim();
  const u = document.getElementById('fUrl').value.trim();
  const catId = parseInt(document.getElementById('fCat').value);
  if(!t || !u) return;
  if(editing){
    await fetch(`/api/links/${editing.itemId}`, {
      method:'PUT', headers: authHeaders(),
      body: JSON.stringify({ title: t, url: u, category_id: catId }),
    });
  } else {
    await fetch('/api/links', {
      method:'POST', headers: authHeaders(),
      body: JSON.stringify({ title: t, url: u, category_id: catId }),
    });
  }
  closeModal();
  loadData();
}

// ---------- 初始化 ----------
(async function init(){
  await loadData();
  await verifyStoredPassword();
  render();
})();
</script>
</body>
</html>
