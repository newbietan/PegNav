name = "personal-nav"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"

# D1 自动开通（Automatic provisioning，Beta）
# 只声明 binding，不写 database_id：
# - 控制台连接 GitHub 部署时，Cloudflare 会自动创建并绑定 D1
# - 绑定名必须是 DB（代码里 env.DB）
# 详见：https://developers.cloudflare.com/workers/wrangler/configuration/#automatic-provisioning
[[d1_databases]]
binding = "DB"
database_name = "personal-nav-db"

# 前端由 Vite 构建到 dist/client，作为 Worker Assets 托管
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
# 保证 /api/* 优先走 Worker（Hono），而不是被静态资源吃掉
run_worker_first = ["/api/*"]
